name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff aiosqlite

      - name: Lint with Ruff
        run: ruff check . --ignore E501,E402,F401,W291,W293,F841,B006 || true

      - name: Check syntax of all Python files
        run: |
          python -c "
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('app'):
              dirs[:] = [d for d in dirs if d != '__pycache__']
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          ast.parse(open(path).read())
                          print(f'OK: {path}')
                      except SyntaxError as e:
                          errors.append(f'ERROR: {path}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('All files syntax OK')
          "

      - name: Check imports work
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          GITHUB_CLIENT_ID: test_id
          GITHUB_CLIENT_SECRET: test_secret
          GITHUB_REDIRECT_URI: http://localhost:8000/auth/github/callback
          JWT_SECRET_KEY: test_secret_key_for_ci_only
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "3"
          REFRESH_TOKEN_EXPIRE_MINUTES: "5"
          FRONTEND_URL: http://localhost:5173
        run: |
          python -c "from app.models import Profile, User; print('Models OK')"
          python -c "from app.schemas import ProfileData, UserResponse; print('Schemas OK')"
          python -c "from app.auth import create_access_token, verify_access_token; print('Auth OK')"
          python -c "from app.services.nlp_parser import parse_natural_language_query; print('NLP OK')"
          echo "All imports passed"